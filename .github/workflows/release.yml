name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: vars.DELTA_RELEASE_AUTOMATION_ENABLED == 'true'
    name: Sign, notarize, verify, and publish
    runs-on: macos-26
    environment: release
    timeout-minutes: 90
    steps:
      - name: Check out full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require all protected release inputs
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          NOTARY_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          SPARKLE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test "$APPLE_TEAM" = "BJCVJ5G7MJ"
          test -n "$NOTARY_KEY_BASE64"
          test -n "$NOTARY_KEY_ID"
          test -n "$NOTARY_ISSUER_ID"
          test -n "$SPARKLE_KEY_BASE64"

      - name: Install audit dependency
        run: brew install gitleaks

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/delta-signing.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          echo "DELTA_SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "DELTA_SIGNING_CERTIFICATE=$CERTIFICATE" >> "$GITHUB_ENV"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F\" '$2 == "Developer ID Application: Daniel Buskariol (BJCVJ5G7MJ)" {print $2; exit}')"
          test "$IDENTITY" = "Developer ID Application: Daniel Buskariol (BJCVJ5G7MJ)"
          echo "DELTA_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Materialize private release keys
        env:
          NOTARY_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
          SPARKLE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          printf '%s' "$NOTARY_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
          printf '%s' "$SPARKLE_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/delta-sparkle-key"
          chmod 600 "$RUNNER_TEMP"/AuthKey_*.p8 "$RUNNER_TEMP/delta-sparkle-key"

      - name: Build, notarize, and verify release
        env:
          DELTA_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          DELTA_NOTARY_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          DELTA_NOTARY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          DELTA_NOTARY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          DELTA_SPARKLE_PRIVATE_KEY_FILE: ${{ runner.temp }}/delta-sparkle-key
          DELTA_GITHUB_REPOSITORY: ${{ github.repository }}
          DELTA_RELEASE_TAG: ${{ github.ref_name }}
        run: Scripts/release.sh finalize

      - name: Preserve private evidence and symbols
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: delta-${{ github.ref_name }}-private-release-evidence
          if-no-files-found: error
          retention-days: 90
          path: |
            dist/notarization/*.json
            dist/symbols/*.zip
            dist/updates/release.json
            dist/updates/SHA256SUMS

      - name: Draft, redownload, verify, and publish
        env:
          GH_TOKEN: ${{ github.token }}
          DELTA_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          DELTA_SPARKLE_PRIVATE_KEY_FILE: ${{ runner.temp }}/delta-sparkle-key
          DELTA_GITHUB_REPOSITORY: ${{ github.repository }}
          DELTA_RELEASE_TAG: ${{ github.ref_name }}
        run: Scripts/publish-release.sh

      - name: Remove release credentials
        if: always()
        run: |
          if [[ -n "${DELTA_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$DELTA_SIGNING_KEYCHAIN" || true
          fi
          rm -f \
            "${DELTA_SIGNING_CERTIFICATE:-}" \
            "$RUNNER_TEMP"/AuthKey_*.p8 \
            "$RUNNER_TEMP/delta-sparkle-key"
