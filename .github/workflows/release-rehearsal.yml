name: Release Rehearsal

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-rehearsal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rehearse:
    if: vars.DELTA_RELEASE_REHEARSAL_ENABLED == 'true'
    name: Rehearse universal release graph
    runs-on: macos-26
    environment: release
    timeout-minutes: 75
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require rehearsal inputs
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          APPLE_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          SPARKLE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test "$APPLE_TEAM" = "BJCVJ5G7MJ"
          test -n "$SPARKLE_KEY_BASE64"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/delta-rehearsal.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          echo "DELTA_SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "DELTA_SIGNING_CERTIFICATE=$CERTIFICATE" >> "$GITHUB_ENV"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F\" '$2 == "Developer ID Application: Daniel Buskariol (BJCVJ5G7MJ)" {print $2; exit}')"
          test "$IDENTITY" = "Developer ID Application: Daniel Buskariol (BJCVJ5G7MJ)"
          echo "DELTA_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Materialize Sparkle key
        env:
          SPARKLE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
        run: |
          printf '%s' "$SPARKLE_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/delta-sparkle-key"
          chmod 600 "$RUNNER_TEMP/delta-sparkle-key"

      - name: Rehearse without Apple or GitHub mutation
        env:
          DELTA_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          DELTA_SPARKLE_PRIVATE_KEY_FILE: ${{ runner.temp }}/delta-sparkle-key
          DELTA_GITHUB_REPOSITORY: ${{ github.repository }}
        run: Scripts/release.sh prepare

      - name: Remove rehearsal credentials
        if: always()
        run: |
          if [[ -n "${DELTA_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$DELTA_SIGNING_KEYCHAIN" || true
          fi
          rm -f "${DELTA_SIGNING_CERTIFICATE:-}" "$RUNNER_TEMP/delta-sparkle-key"
